<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorrel</title>
    <script type="module" src="index.js"></script>
  </head>
  <body>
    <h1>Sorrel: local-first search engine</h1>
    <form id="form" method="post">
      <fieldset>
        <legend>Provide your search query</legend>

        <input type="search" name="query" id="query" autocomplete="off" spellcheck="true" />

        <button type="submit">Search</button>
      </fieldset>
    </form>

    <ul id="results"></ul>

    <template id="template">
      <li class="result">
        <a target="_blank" rel="noopener noreferrer"></a>
      </li>
    </template>
  </body>
</html>
